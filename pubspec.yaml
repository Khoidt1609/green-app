name: green_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
    
  # State Management (Giữ nguyên bản ổn định của bạn)
  flutter_riverpod: ^2.5.1

  # Firebase Backend (Giữ nguyên bộ ổn định của bạn, không lo xung đột)
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  google_sign_in: ^6.2.1
  google_fonts: ^6.3.0

  # Media & Map (Đã xóa Google Maps, thay bằng OpenStreetMap & Geolocator)
  image_picker: ^1.1.0
  flutter_image_compress: ^2.3.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.0

  # Tiện ích khác
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  cupertino_icons: ^1.0.8
  dio: ^5.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true